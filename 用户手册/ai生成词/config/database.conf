# HyperZoneLogin Database Configuration | by ksqeib

# 数据库类型
#         支持的值: SQLITE, MYSQL, MARIADB, H2
type=SQLITE
# SQLite 数据库配置
sqlite {
    # 数据库文件路径（相对于插件数据目录）
    path="data/hyperzone_login.db"
}
# MySQL 数据库配置
mysql {
    # MySQL 服务器地址
    host=localhost
    # MySQL 服务器端口
    port=3306
    # 数据库名称
    database="hyperzone_login"
    # 用户名
    username=root
    # 密码
    password=password
    # 额外的连接参数
    parameters="useSSL=false&serverTimezone=UTC&characterEncoding=utf8"
    # JDBC 驱动类
    driver-class-name="com.mysql.cj.jdbc.Driver"
}
# MariaDB 数据库配置
mariadb {
    # MariaDB 服务器地址
    host=localhost
    # MariaDB 服务器端口
    port=3306
    # 数据库名称
    database="hyperzone_login"
    # 用户名
    username=root
    # 密码
    password=password
    # 额外的连接参数
    parameters="useSSL=false&characterEncoding=utf8"
    # JDBC 驱动类
    driver-class-name="org.mariadb.jdbc.Driver"
}
# H2 数据库配置（用于测试）
h2 {
    # H2 数据库文件路径（相对于插件数据目录）
    path="data/hyperzone_login"
}
# 数据库表前缀
table-prefix="hz_"
# 连接池配置
pool {
    # 连接池最大连接数
    maximum-pool-size=10
    # 连接池最小空闲连接数
    minimum-idle=2
    # 连接超时时间（毫秒）
    connection-timeout=30000
    # 空闲连接超时时间（毫秒）
    idle-timeout=600000
    # 连接最大生命周期（毫秒）
    max-lifetime=1800000
}
