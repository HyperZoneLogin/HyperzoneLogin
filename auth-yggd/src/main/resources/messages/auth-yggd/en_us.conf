auth-yggd {
  auth-in-progress = "<yellow>Yggdrasil authentication is in progress. Please wait…</yellow>"
  auth-succeeded = "<green>Yggdrasil authentication passed. Preparing your profile and skin data…</green>"
  profile-resolve-failed = "<red><reason></red><yellow> If the issue is a profile-creation name conflict, use /rename [new-registration-name]; if you want to bind an existing profile, use /bindcode use [binding-code].</yellow>"
  verify-complete-failed = "<red><reason></red><yellow> If the issue is a profile-creation name conflict, use /rename [new-registration-name]; if you want to bind an existing profile, use /bindcode use [binding-code].</yellow>"
  auth-failed = "<red>Yggdrasil authentication failed: <reason></red>"
  first-batch-failed = "<yellow>First-batch authentication failed: <reason></yellow>"
  first-batch-failed-with-status = "<yellow>First-batch authentication failed: <reason> (HTTP <status>)</yellow>"
  first-batch-timeout = "<yellow>First-batch authentication timed out.</yellow>"
}

