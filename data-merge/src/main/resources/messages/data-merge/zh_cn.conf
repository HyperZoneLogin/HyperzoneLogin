data-merge {
  usage {
    ml = "<yellow>/hzl-merge ml</yellow>"
    am = "<yellow>/hzl-merge am</yellow>"
  }
  already-running = "<red>迁移正在执行中，请稍后再试</red>"
  start {
    ml = "<yellow>开始执行 ML 迁移，请稍候...</yellow>"
    am = "<yellow>开始执行 AUTHME 迁移，请稍候...</yellow>"
  }
  completed = "<green>迁移完成: <summary></green>"
  detail-log = "<green>详细日志已输出到 <file_name></green>"
  failed = "<red>迁移失败: <reason></red>"
}

