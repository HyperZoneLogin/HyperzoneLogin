data-merge {
  usage {
    ml = "<yellow>/hzl-merge ml</yellow>"
    am = "<yellow>/hzl-merge am</yellow>"
  }
  already-running = "<red>A migration is already running. Please try again later.</red>"
  start {
    ml = "<yellow>Starting the ML migration. Please wait...</yellow>"
    am = "<yellow>Starting the AUTHME migration. Please wait...</yellow>"
  }
  completed = "<green>Migration completed: <summary></green>"
  detail-log = "<green>Detailed logs have been written to <file_name></green>"
  failed = "<red>Migration failed: <reason></red>"
}

