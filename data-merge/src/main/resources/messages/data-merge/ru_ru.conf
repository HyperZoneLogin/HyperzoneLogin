data-merge {
  usage {
    ml = "<yellow>/hzl-merge ml</yellow>"
    am = "<yellow>/hzl-merge am</yellow>"
  }
  already-running = "<red>Миграция уже выполняется. Повторите попытку позже.</red>"
  start {
    ml = "<yellow>Запуск миграции ML. Пожалуйста, подождите...</yellow>"
    am = "<yellow>Запуск миграции AUTHME. Пожалуйста, подождите...</yellow>"
  }
  completed = "<green>Миграция завершена: <summary></green>"
  detail-log = "<green>Подробный журнал записан в <file_name></green>"
  failed = "<red>Ошибка миграции: <reason></red>"
}

