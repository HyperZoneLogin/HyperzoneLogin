safe {
  username {
    length-invalid = "<red>Username length does not meet the requirements.</red>"
    whitespace-invalid = "<red>Usernames may not contain leading or trailing whitespace.</red>"
    pattern-invalid = "<red>The username contains disallowed characters.</red>"
  }
  entry-rejected = "<red>Your connection was rejected by the entry guard: <reason></red>"
  auth-failure-cooldown = "<red>This IP has been temporarily restricted due to too many authentication failures. Please try again in <seconds> seconds.</red>"
  ip-cooldown = "<red>Your IP has been temporarily restricted. Please try again in <seconds> seconds.</red>"
  global-rate-limited {
    normal = "<red>There are too many connection requests right now. Please try again later.</red>"
    strict = "<red>There are too many connection requests right now. Please try again later (peak protection mode is active).</red>"
  }
  ip-rate-limited {
    cooldown = "<red>Your IP is making too many requests and has been temporarily restricted for <seconds> seconds.</red>"
    normal = "<red>Your IP is making too many requests. Please try again later.</red>"
    strict = "<red>Your IP is making too many requests. Please try again later (peak protection mode is active).</red>"
  }
}

